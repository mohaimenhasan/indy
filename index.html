<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Spin Clash — Open World Spinning Top RPG!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌀</text></svg>">
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="mobileControls">
        <div id="dpad">
            <button class="dpad-btn" data-dir="up">▲</button>
            <button class="dpad-btn" data-dir="left">◀</button>
            <button class="dpad-btn" data-dir="right">▶</button>
            <button class="dpad-btn" data-dir="down">▼</button>
        </div>
        <div id="actionBtns">
            <button class="action-btn" id="btnA">A</button>
            <button class="action-btn" id="btnB">B</button>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
